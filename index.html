<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will you be my Valentine?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Custom Cursor Element -->
    <div id="custom-cursor">
        <img src="assets/user_image.png" alt="My Valentine">
    </div>

    <main class="container">
        <h1 class="title">Will you be my Valentine?</h1>
        <div class="buttons">
            <button id="yes-btn">YES! 💖</button>
            <button id="no-btn">NO 😢</button>
        </div>
        <div class="hearts-container"></div>
    </main>

    <!-- Overlay for Special Sequence (No Button) -->
    <div id="overlay" class="hidden">
        <img id="overlay-img" src="" alt="">
        <h1 id="overlay-text"></h1>
    </div>

    <script src="script.js"></script>
</body>

</html>
